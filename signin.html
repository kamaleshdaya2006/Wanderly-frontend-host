<!DOCTYPE html>
<html>
<head>
    <title>Wanderly – Sign In</title>
    <link rel="stylesheet" href="Signinpage.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="title-floating-box">
    <h1 class="site-title">WANDERLY</h1>
</div>

<div class="bg-wrapper">
    <div class="bg-layer"></div>

    <div class="content-layer">
        <div class="overallbox">
            <div class="top-toggle">
    <div class="siginbox active">SIGN-IN</div>
    <a href="signup.html" class="siginbox">SIGN-UP</a>
</div>



            <div class="form-area">
                <form id="loginForm">

                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="text" id="email" name="email" placeholder="Enter your email" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>

                    <a href="#" class="forgot-link">Forgot password?</a>

                    <button type="submit" class="signin-btn">Sign In</button>

                    <!-- Message area -->
                    <p id="message" style="text-align:center; margin-top:15px;"></p>

                </form>
            </div>

        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    document.getElementById("loginForm").addEventListener("submit", async function(e) {
        e.preventDefault();

        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const message = document.getElementById("message");

        try {
            const response = await fetch("http://127.0.0.1:5000/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    email: email,
                    password: password
                })
            });

            const data = await response.json();

           if (response.ok) {
    // store user data in browser
    localStorage.setItem("user", JSON.stringify(data));

    message.style.color = "green";
    message.textContent = "Login successful! Redirecting...";

    setTimeout(() => {
        window.location.href = "homepage.html";
    }, 1000);
}
 else {
                message.style.color = "red";
                message.textContent = data.message;
            }

        } catch (error) {
            message.style.color = "red";
            message.textContent = "Server error. Please try again.";
        }
    });
});

</script>

</body>
</html>
