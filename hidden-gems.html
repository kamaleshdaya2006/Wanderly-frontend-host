<!DOCTYPE HTML>
<html>
<title>Hidden Gems in Chennai</title>
<head>
<link rel="stylesheet" href="hidden-gems.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="home-bg">

<!-- Back to Chennai -->
<div class="home-container" onclick="goToChennai()">
    <i class="fa-solid fa-house home-icon"></i>
    <span class="home-text">Back to Chennai</span>
</div>

<!-- Profile -->
<div class="profile-container" onmouseover="openProfile()">
    <i class="fa-solid fa-circle-user profile-icon"></i>
    <span class="profile-text">View Profile</span>
</div>

<div class="profile-overlay" id="profileOverlay"></div>

<div class="profile-panel" id="profilePanel">
    <div class="profile-header">
        <h2>My Profile</h2>
        <i class="fa-solid fa-xmark close-btn" onclick="closeProfile()"></i>
    </div>

    <div class="profile-body">
        <h3 id="profileName"></h3>
        <p>Wanderly User</p>

        <div class="profile-info">
            <div><strong>Email:</strong> <span id="profileEmail"></span></div>
            <div><strong>City:</strong> <span id="profileCity"></span></div>
        </div>
    </div>
</div>

<!-- Title -->
<div class="title-block">
    <h1 class="title-text">Hidden Gems of Chennai</h1>
    <div class="subtitle">
        <span class="line"></span>
        <span class="subtitle-text">Off the tourist trail</span>
        <span class="line"></span>
    </div>
    <p class="title-description">
        Uncover quieter, lesser-known spots that offer authentic experiences without the crowds.
    </p>
</div>


<!-- Gems Section -->
<section class="gems-section">
    <div class="gems-grid" id="gemsContainer"></div>
</section>

<script>
function goToChennai() {
    window.location.href = "chennaimain.html";
}

function openProfile() {
    document.getElementById("profilePanel").classList.add("active");
    document.getElementById("profileOverlay").classList.add("active");
}

function closeProfile() {
    document.getElementById("profilePanel").classList.remove("active");
    document.getElementById("profileOverlay").classList.remove("active");
}

function loadProfile() {
    const userData = localStorage.getItem("user");
    if (!userData) {
        window.location.href = "signin.html";
        return;
    }

    const user = JSON.parse(userData);
    document.getElementById("profileName").textContent = user.name;
    document.getElementById("profileEmail").textContent = user.email;
    document.getElementById("profileCity").textContent = user.city;
}

/* Load hidden gems */
function loadHiddenGems() {
    fetch("http://localhost:5000/hidden-gems")
        .then(res => res.json())
        .then(data => {
            const container = document.getElementById("gemsContainer");
            container.innerHTML = "";

            data.forEach(place => {
                const card = document.createElement("div");
                card.classList.add("gem-card");

                card.innerHTML = `
                    <img src="${place.image}" alt="${place.name}">
                    <div class="gem-info">
                        <h3>${place.name}</h3>
                        <p>${place.description.substring(0, 120)}...</p>
                    </div>
                `;

                card.onclick = () => {
                    window.location.href = "place.html?id=" + place.place_id;
                };

                container.appendChild(card);
            });
        });
}

document.addEventListener("DOMContentLoaded", () => {
    loadProfile();
    loadHiddenGems();
});
</script>

</body>
</html>
