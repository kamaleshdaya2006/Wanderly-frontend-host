<!DOCTYPE html>
<html>
<head>
    <title>My Trips</title>
    <link rel="stylesheet" href="trips.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="home-bg">

<!-- Home -->
<div class="home-container" onclick="goToHome()">
    <i class="fa-solid fa-house home-icon"></i>
    <span class="home-text">Back to Chennai</span>
</div>

<!-- Profile -->
<div class="profile-container" onmouseover="openProfile()">
    <i class="fa-solid fa-circle-user profile-icon"></i>
    <span class="profile-text">View Profile</span>
</div>

<div class="profile-overlay" id="profileOverlay"></div>

<div class="profile-panel" id="profilePanel">
    <div class="profile-header">
        <h2>My Profile</h2>
        <i class="fa-solid fa-xmark close-btn" onclick="closeProfile()"></i>
    </div>

    <div class="profile-body">
        <h3 id="profileName">User Name</h3>
        <p>Wanderly User</p>

        <div class="profile-info">
            <div><strong>Email:</strong> <span id="profileEmail"></span></div>
            <div><strong>City:</strong> <span id="profileCity"></span></div>
        </div>

        <div class="profile-actions">
            <button class="profile-btn trip-btn" onclick="goToHome()">
    <i class="fa-solid fa-house"></i>
    Home Page
</button>


            <button class="profile-btn logout-btn" onclick="logout()">
                <i class="fa-solid fa-right-from-bracket"></i>
                Logout
            </button>
        </div>
    </div>
</div>

<!-- Title -->
<div class="title-block">
    <h1 class="title-text">My Trips</h1>
    <div class="subtitle">
        <span class="line"></span>
        <span class="subtitle-text">Plan your perfect journey</span>
        <span class="line"></span>
    </div>
</div>

<div class="trip-controls">
    <button class="add-trip-btn" onclick="openTripForm()">
        <i class="fa-solid fa-plus"></i> New Trip
    </button>
</div>

<div class="trip-form-overlay" id="tripOverlay"></div>

<div class="trip-form" id="tripForm">
    <h2>Create a New Trip</h2>

    <div class="form-group">
        <label>Trip Name</label>
        <input type="text" id="tripName" placeholder="e.g. Weekend in Chennai">
    </div>

    <div class="form-group">
        <label>Start Date</label>
        <input type="date" id="tripStart">
    </div>

    <div class="form-group">
        <label>Number of Days</label>
        <div class="day-selector">
            <button onclick="changeDays(-1)">−</button>
            <span id="dayCount">2</span>
            <button onclick="changeDays(1)">+</button>
        </div>
    </div>

    <button class="create-trip-btn" onclick="createTrip()">
        Create Trip
    </button>
</div>

<!-- Trips Container -->
<div class="trips-container" id="tripsContainer">
    <!-- Trips will load here -->
</div>
<div class="place-preview" id="placePreview">
    <div class="preview-card">
        <img id="previewImg">
        <h3 id="previewName"></h3>
        <p id="previewDesc"></p>
        <button onclick="confirmPlace()">Add to Trip</button>
        <button onclick="closePreview()">Cancel</button>
    </div>
</div>
<section class="canvas-section">
    <h2>✍️ Plan Your Trip (Sketch Pad)</h2>
    <canvas id="drawCanvas" width="800" height="400"></canvas>
    <div class="canvas-controls">
        <button onclick="clearCanvas()">Clear</button>
    </div>
</section>

<script>
function goToHome() {
    window.location.href = "chennaimain.html";
}

let tripDays = 2;
let selectedPlace = {};

// -----------------------------
// Load trips
// -----------------------------
function loadTrips() {
    const container = document.getElementById("tripsContainer");
    container.innerHTML = "";

    const user = JSON.parse(localStorage.getItem("user"));
    if (!user) return;

    fetch(`https://wanderly-backend-4hhs.onrender.com/trips/${user.user_id}`)
        .then(res => res.json())
        .then(trips => {

            if (trips.length === 0) {
                container.innerHTML = "<p class='empty-msg'>No trips yet.</p>";
                return;
            }

            trips.forEach(trip => {

                let daysHTML = "";
                for (let d = 1; d <= trip.days; d++) {
                    daysHTML += renderDay(trip.trip_id, d);
                }

                container.innerHTML += `
                    <div class="trip-card">
                       <div class="trip-header">
    <h3>${trip.name}</h3>
    <div>
        <button class="edit-trip-btn"
    onclick="editTrip(${trip.trip_id}, ${trip.days})">
    <i class="fa-solid fa-pen"></i>
</button>

        <button class="delete-btn"
            onclick="deleteTrip(${trip.trip_id})">
            <i class="fa-solid fa-trash"></i>
        </button>
    </div>
</div>


                        <p class="trip-date">
                            ${trip.days} day trip
                        </p>

                        <div class="trip-days">
                            ${daysHTML}
                        </div>
                    </div>
                `;

                // load places for this trip
                loadTripPlaces(trip.trip_id);
            });
        });
}

// -----------------------------
// Load places inside trip days
// -----------------------------
function loadTripPlaces(tripId) {
    fetch(`https://wanderly-backend-4hhs.onrender.com/trip_places/${tripId}`)
        .then(res => res.json())
        .then(days => {

            for (const day in days) {
                const list = document.getElementById(`day-${tripId}-${day}`);
                if (!list) continue;

                list.innerHTML = days[day]
                    .map(place => `
                    <li class="place-item">
    <span class="place-name">${place.name}</span>

    <div class="place-actions">
        <button class="place-btn remove-btn"
            onclick="removePlace(${place.id})">
            <i class="fa-solid fa-trash"></i>
        </button>

        <button class="place-btn move-btn"
            onclick="movePlace(${place.id})">
            <i class="fa-solid fa-arrows-up-down-left-right"></i>
        </button>
    </div>
</li>

                    `)
                    .join("");
            }
        });
}
function removePlace(tpId) {
    fetch(`https://wanderly-backend-4hhs.onrender.com/trip_places/${tpId}`, {
        method: "DELETE"
    })
    .then(() => loadTrips());
}
function movePlace(tpId) {
    const newDay = prompt("Move to which day?");
    if (!newDay) return;

    fetch(`https://wanderly-backend-4hhs.onrender.com/trip_places/${tpId}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            day_number: parseInt(newDay)
        })
    })
    .then(() => loadTrips());
}

// -----------------------------
// Create trip
// -----------------------------
function createTrip() {
    const name = document.getElementById("tripName").value;
    if (!name) {
        alert("Enter trip name");
        return;
    }

    const user = JSON.parse(localStorage.getItem("user"));

    fetch("https://wanderly-backend-4hhs.onrender.com/trips", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            user_id: user.user_id,
            name: name,
            days: tripDays
        })
    })
    .then(() => {
        closeTripForm();
        loadTrips();
    });
}

// -----------------------------
// Delete trip
// -----------------------------
function deleteTrip(tripId) {
    fetch(`https://wanderly-backend-4hhs.onrender.com/trips/${tripId}`, {
        method: "DELETE"
    })
    .then(() => loadTrips());
}
function editTrip(tripId, currentDays) {
    const newDays = prompt("Enter new number of days:", currentDays);
    if (!newDays) return;

    const newStart = prompt("Enter new start date (YYYY-MM-DD):");
    if (!newStart) return;

    fetch(`https://wanderly-backend-4hhs.onrender.com/trips/${tripId}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            days: parseInt(newDays),
            start_date: newStart
        })
    })
    .then(() => loadTrips());
}

// -----------------------------
// Render each day block
// -----------------------------
function renderDay(tripId, dayNumber) {
    return `
        <div class="day-block">
            <strong>Day ${dayNumber}</strong>

            <input type="text"
                class="place-search"
                placeholder="Search places..."
                oninput="searchPlaces(this, ${tripId}, ${dayNumber})">

            <div class="search-results"></div>

            <ul class="day-places" id="day-${tripId}-${dayNumber}"></ul>
        </div>
    `;
}

// -----------------------------
// Search places
function searchPlaces(input, tripId, dayNumber) {
    const query = input.value;
    const resultsBox = input.nextElementSibling;

    if (query.length < 2) {
        resultsBox.innerHTML = "";
        return;
    }

    fetch(`https://wanderly-backend-4hhs.onrender.com/places/search?q=${query}`)
        .then(res => {
            if (!res.ok) throw new Error("Search API failed");
            return res.json();
        })
        .then(data => {
            resultsBox.innerHTML = data.map(place => `
                <div class="search-item"
                    onclick="previewPlace(${place.place_id}, '${place.name}', '${place.description}', '${place.image}', ${tripId}, ${dayNumber})">
                    ${place.name}
                </div>
            `).join("");
        })
        .catch(err => console.error("Search error:", err));
}

// -----------------------------
// Preview modal
// -----------------------------
function previewPlace(id, name, desc, img, tripId, dayNumber) {
    selectedPlace = { id, tripId, dayNumber };

    document.getElementById("previewName").textContent = name;
    document.getElementById("previewDesc").textContent = desc;

    // safer image path
    document.getElementById("previewImg").src = img;

    document.getElementById("placePreview").classList.add("active");
}

function closePreview() {
    document.getElementById("placePreview").classList.remove("active");
}

// -----------------------------
// Confirm place
// -----------------------------
function confirmPlace() {
    fetch("https://wanderly-backend-4hhs.onrender.com/trips/trip_places", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            trip_id: selectedPlace.tripId,
            place_id: selectedPlace.id,
            day_number: selectedPlace.dayNumber,
            order_in_day: 1
        })
    })
    .then(() => {
        closePreview();
        loadTrips();
    });
}

// -----------------------------
// Trip form controls
// -----------------------------
function openTripForm() {
    document.getElementById("tripOverlay").classList.add("active");
    document.getElementById("tripForm").classList.add("active");
}

function closeTripForm() {
    document.getElementById("tripOverlay").classList.remove("active");
    document.getElementById("tripForm").classList.remove("active");
}

function changeDays(val) {
    tripDays += val;
    if (tripDays < 1) tripDays = 1;
    if (tripDays > 14) tripDays = 14;
    document.getElementById("dayCount").textContent = tripDays;
}
function openProfile() { document.getElementById("profilePanel").classList.add("active"); document.getElementById("profileOverlay").classList.add("active"); } function closeProfile() { document.getElementById("profilePanel").classList.remove("active"); document.getElementById("profileOverlay").classList.remove("active"); } function logout() { localStorage.removeItem("user"); window.location.href = "signin.html"; } function loadProfile() { const userData = localStorage.getItem("user"); if (!userData) { window.location.href = "signin.html"; return; } const user = JSON.parse(userData); document.getElementById("profileName").textContent = user.name; document.getElementById("profileEmail").textContent = user.email; document.getElementById("profileCity").textContent = user.city; }
// -----------------------------
document.addEventListener("DOMContentLoaded", () => {
    loadTrips();
    loadProfile();
});

const canvas = document.getElementById("drawCanvas");
const ctx = canvas.getContext("2d");

let drawing = false;

canvas.addEventListener("mousedown", () => {
    drawing = true;
    ctx.beginPath();
});

canvas.addEventListener("mouseup", () => {
    drawing = false;
});

canvas.addEventListener("mousemove", (e) => {
    if (!drawing) return;

    ctx.lineWidth = 2;
    ctx.lineCap = "round";
    ctx.strokeStyle = "#000";

    ctx.lineTo(e.offsetX, e.offsetY);
    ctx.stroke();
});

function clearCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}
</script>

</body>
</html>
