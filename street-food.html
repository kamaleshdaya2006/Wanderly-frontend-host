<!DOCTYPE HTML>
<html>
<title>Street Food in Chennai</title>
<head>
<link rel="stylesheet" href="street-food.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="home-bg">

<!-- Home -->
<div class="home-container" onclick="goToChennai()">
    <i class="fa-solid fa-house home-icon"></i>
    <span class="home-text">Back to Chennai</span>
</div>

<!-- Profile -->
<div class="profile-container" onmouseover="openProfile()">
    <i class="fa-solid fa-circle-user profile-icon"></i>
    <span class="profile-text">View Profile</span>
</div>

<div class="profile-overlay" id="profileOverlay"></div>

<div class="profile-panel" id="profilePanel">
    <div class="profile-header">
        <h2>My Profile</h2>
        <i class="fa-solid fa-xmark close-btn" onclick="closeProfile()"></i>
    </div>

    <div class="profile-body">
        <h3 id="profileName"></h3>
        <p>Wanderly User</p>

        <div class="profile-info">
            <div><strong>Email:</strong> <span id="profileEmail"></span></div>
            <div><strong>City:</strong> <span id="profileCity"></span></div>
        </div>
    </div>
</div>

<!-- Title -->
<div class="title-block">
    <h1 class="title-text">Chennai Street Food</h1>
    <div class="subtitle">
        <span class="line"></span>
        <span class="subtitle-text">Taste the real city</span>
        <span class="line"></span>
    </div>
	<br><!-- Add Food Floating Button -->
<div class="add-food-container">
    <button class="add-food-btn" onclick="goToAddItem('food')">
        <i class="fa-solid fa-plus"></i>
        Add a Food
    </button>
</div>
</div>

<!-- Food Section --> <section class="food-page-section"> <div class="food-scroll" id="foodContainer"> <!-- food cards will load here --> </div> </section>

<script>
function goToChennai() {
    window.location.href = "chennaimain.html";
}

/* Profile logic */
function openProfile() {
    document.getElementById("profilePanel").classList.add("active");
    document.getElementById("profileOverlay").classList.add("active");
}

function closeProfile() {
    document.getElementById("profilePanel").classList.remove("active");
    document.getElementById("profileOverlay").classList.remove("active");
}

function loadProfile() {
    const userData = localStorage.getItem("user");
    if (!userData) {
        window.location.href = "signin.html";
        return;
    }

    const user = JSON.parse(userData);
    document.getElementById("profileName").textContent = user.name;
    document.getElementById("profileEmail").textContent = user.email;
    document.getElementById("profileCity").textContent = user.city;
}

/* Load foods */
function loadFoods() {
    fetch("https://wanderly-backend-4hhs.onrender.com/foods")
        .then(res => {
            if (!res.ok) throw new Error("Failed to load foods");
            return res.json();
        })
        .then(data => {
            const container = document.getElementById("foodContainer");
            container.innerHTML = "";

            data.forEach(food => {
                const card = document.createElement("div");
                card.classList.add("food-card-large");

                card.innerHTML = `
                    <h3 class="clickable">${food.name}</h3>
                    <div class="rating">⭐ ${food.rating || "4.0"}</div>
                    <p>${food.description}</p>

                    <div class="food-meta">
                        <span><i class="fa-solid fa-location-dot"></i> ${food.place_name}</span>
                        <span><i class="fa-solid fa-store"></i> ${food.shop_name || "Local Stall"}</span>
                    </div>

                    <div class="review-section" id="reviews-food-${food.food_id}">
                        <p>Loading reviews...</p>
                    </div>
                `;

                // 🔥 click only on title
                card.querySelector(".clickable").onclick = () => {
                    window.location.href = "place.html?id=" + food.place_id;
                };

                container.appendChild(card);

                // 🔥 load reviews
                loadReviews("food", food.food_id, `reviews-food-${food.food_id}`);
            });
        })
        .catch(() => {
            document.getElementById("foodContainer").innerHTML =
                "<p>Error loading foods</p>";
        });
}
function loadReviews(entityType, entityId, containerId) {
    fetch(`https://wanderly-backend-4hhs.onrender.com/reviews?entity_type=${entityType}&entity_id=${entityId}`)
        .then(res => res.json())
        .then(data => {
            const container = document.getElementById(containerId);

            if (!data.length) {
                container.innerHTML = "<p>No reviews yet</p>";
                return;
            }

            container.innerHTML = "";

            data.forEach(r => {
                const div = document.createElement("div");
                div.classList.add("review-card");

                div.innerHTML = `
                    <div>⭐ ${r.rating || "-"}</div>
                    <p>${r.review_text}</p>
                    <small>${r.created_at}</small>
                `;

                container.appendChild(div);
            });
        })
        .catch(() => {
            document.getElementById(containerId).innerHTML = "<p>Error loading reviews</p>";
        });
}
document.addEventListener("DOMContentLoaded", () => {
    loadProfile();
    loadFoods();
});
function goToAddItem(type) {
    window.location.href = "add-item.html?type=" + type;
}
</script>

</body>
</html>
